<div class="flex h-screen bg-base">

  <!-- Sidebar -->
  <aside class="w-56 bg-surface border-r border-border flex flex-col shrink-0">

    <!-- Logo -->
    <div class="px-5 py-4 border-b border-border">
      <span class="text-base font-bold text-text tracking-tight">RaidMetrics</span>
    </div>

    <!-- Nav -->
    <nav class="flex-1 p-3 space-y-0.5">
      <a
        routerLink="/dashboard"
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive="bg-surface-raised text-accent"
        class="flex items-center gap-3 px-3 py-2 rounded-lg text-muted hover:text-text hover:bg-surface-raised transition-colors text-sm"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        Characters
      </a>
    </nav>

    <!-- Logout -->
    <div class="p-3 border-t border-border">
      <button
        (click)="logout()"
        class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-muted hover:text-danger hover:bg-danger/10 transition-colors text-sm"
      >
        <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Log out
      </button>
    </div>

  </aside>

  <!-- Main -->
  <main class="flex-1 overflow-auto">
    <router-outlet />
  </main>

</div>
